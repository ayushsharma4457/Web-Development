<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
    <!--Start Of Internal CSS-->
    <style>
        ul{
            list-style: square;
        }
        ol{
            list-style: lower-roman;
        }
    </style>
    <!--End Of Internal CSS-->
</head>
<body>
    <h1>Lists</h1>
    <h3>Unordered List</h3>
    <ul>
    <!--Start With <ul>-->
        <li>Coffee</li>
        <li>Laptop</li>
        <li>Class</li>
    </ul>
    <h3>Ordered List</h3>
    <!--Start With <ol>-->
    <ol>
        <li>Juice</li>
        <li>Computer</li>
        <li>Car</li>
    </ol>
    <h3>Decription List</h3>
    <!--List Of Item With description Of each term.-->
    <dl> <!--Description List-->
        <dt>Coffee</dt> <!--Define The Term-->
        <dd>Hot Black</dd> <!--Describe Each Term-->
        <dt>Milk</dt>
        <dd>White Cold</dd>
    </dl>
</body>
</html>
